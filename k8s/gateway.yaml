apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-gateway
  namespace: infra-tmpl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infra-gateway
  template:
    metadata:
      labels:
        app: infra-gateway
    spec:
      containers:
        - name: infra-gateway
          image: infra-tmpl/infra-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: infra-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infra-gateway
  namespace: infra-tmpl
spec:
  type: ClusterIP
  selector:
    app: infra-gateway
  ports:
    - port: 8080
      targetPort: 8080
