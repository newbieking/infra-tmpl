spring:
  application:
    name: infra-auth
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:infradb}
    username: ${DB_USER:infra}
    password: ${DB_PASSWORD:infra123}
  jpa:
    hibernate:
      ddl-auto: update
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos

server:
  port: 8086

infra:
  jwt:
    secret: ${JWT_SECRET:DefaultSecretKeyForDevelopment01234567890123456789}
    expiration: 86400000
