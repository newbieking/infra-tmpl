spring:
  application:
    name: infra-search
  data:
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos

server:
  port: 8083
