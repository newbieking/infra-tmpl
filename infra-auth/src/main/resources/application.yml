spring:
  application:
    name: infra-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos

server:
  port: 8086

infra:
  jwt:
    secret: ${JWT_SECRET:DefaultSecretKeyForDevelopment01234567890123456789}
    expiration: 86400000
