spring:
  application:
    name: infra-tmpl
  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:infradb}
    username: ${DB_USER:infra}
    password: ${DB_PASSWORD:infra123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}

  kafka:
    bootstrap-servers: ${KAFKA_SERVER:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: infra-tmpl-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.infra.template.dto"
      auto-offset-reset: earliest

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
        namespace: public
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
        file-extension: yml
        namespace: public
        group: DEFAULT_GROUP

# Sentinel
sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
    port: 8719
  eager: true

# Seata
seata:
  enabled: ${SEATA_ENABLED:true}
  application-id: ${spring.application.name}
  tx-service-group: ${spring.application.name}-tx-group
  service:
    vgroup-mapping:
      infra-tmpl-tx-group: default
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: nacos
      password: nacos
      group: SEATA_GROUP
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      username: nacos
      password: nacos
      group: SEATA_GROUP

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

infra:
  minio:
    endpoint: http://${MINIO_HOST:localhost}:${MINIO_PORT:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:infra-storage}
  kafka:
    topic: infra-events
