stages:
  - test
  - build
  - docker
  - deploy

variables:
  DOCKER_REGISTRY: registry.example.com
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ==================== Test ====================

unit-test:
  stage: test
  image: eclipse-temurin:17-jdk
  script:
    - ./gradlew test
  artifacts:
    reports:
      junit: "**/build/test-results/test/*.xml"
    paths:
      - "**/build/reports/jacoco"
  cache:
    key: gradle-cache
    paths:
      - .gradle/
      - build/

# ==================== Build ====================

build-services:
  stage: build
  image: eclipse-temurin:17-jdk
  script:
    - ./gradlew build -x test
  artifacts:
    paths:
      - "infra-*/build/libs/*.jar"
  cache:
    key: gradle-cache
    paths:
      - .gradle/

# ==================== Docker ====================

.docker-template: &docker-template
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-gateway:
  <<: *docker-template
  script:
    - docker build -t $DOCKER_REGISTRY/infra-gateway:$IMAGE_TAG -f infra-gateway/Dockerfile .
    - docker push $DOCKER_REGISTRY/infra-gateway:$IMAGE_TAG

build-auth:
  <<: *docker-template
  script:
    - docker build -t $DOCKER_REGISTRY/infra-auth:$IMAGE_TAG -f infra-auth/Dockerfile .
    - docker push $DOCKER_REGISTRY/infra-auth:$IMAGE_TAG

build-user:
  <<: *docker-template
  script:
    - docker build -t $DOCKER_REGISTRY/infra-user:$IMAGE_TAG -f infra-user/Dockerfile .
    - docker push $DOCKER_REGISTRY/infra-user:$IMAGE_TAG

build-order:
  <<: *docker-template
  script:
    - docker build -t $DOCKER_REGISTRY/infra-order:$IMAGE_TAG -f infra-order/Dockerfile .
    - docker push $DOCKER_REGISTRY/infra-order:$IMAGE_TAG

# ==================== Deploy ====================

deploy-staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl apply -f k8s/
    - kubectl set image deployment/infra-gateway infra-gateway=$DOCKER_REGISTRY/infra-gateway:$IMAGE_TAG -n infra-tmpl
    - kubectl set image deployment/infra-user infra-user=$DOCKER_REGISTRY/infra-user:$IMAGE_TAG -n infra-tmpl
    - kubectl set image deployment/infra-order infra-order=$DOCKER_REGISTRY/infra-order:$IMAGE_TAG -n infra-tmpl
    - kubectl rollout status deployment -n infra-tmpl
  environment:
    name: staging
  only:
    - main
