spring:
  application:
    name: infra-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        username: nacos
        password: nacos
    gateway:
      routes:
        - id: infra-auth
          uri: lb://infra-auth
          predicates:
            - Path=/api/v1/auth/**
        - id: infra-user
          uri: lb://infra-user
          predicates:
            - Path=/api/v1/users/**
        - id: infra-order
          uri: lb://infra-order
          predicates:
            - Path=/api/v1/orders/**
        - id: infra-search
          uri: lb://infra-search
          predicates:
            - Path=/api/v1/search/**
        - id: infra-storage
          uri: lb://infra-storage
          predicates:
            - Path=/api/v1/storage/**
        - id: infra-event
          uri: lb://infra-event
          predicates:
            - Path=/api/v1/events/**,/api/v1/cache/**
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 50
            redis-rate-limiter.burstCapacity: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

sentinel:
  transport:
    dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
    port: 8719
  eager: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
