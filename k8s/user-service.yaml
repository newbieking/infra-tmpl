apiVersion: apps/v1
kind: Deployment
metadata:
  name: infra-user
  namespace: infra-tmpl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: infra-user
  template:
    metadata:
      labels:
        app: infra-user
    spec:
      containers:
        - name: infra-user
          image: infra-tmpl/infra-user:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: infra-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: db-password
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: infra-user
  namespace: infra-tmpl
spec:
  type: ClusterIP
  selector:
    app: infra-user
  ports:
    - port: 8081
      targetPort: 8081
